name: Android CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'landing/**'
      - '*.md'
      - '.github/workflows/generate-keystore.yml'
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ---- DEBUG BUILD (push to main) ----
      - name: Build debug APK
        if: ${{ github.event_name == 'push' }}
        run: ./gradlew assembleDebug --console=plain

      - name: Upload debug APK
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: lich-am-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ---- RELEASE BUILD (workflow_dispatch) ----
      - name: Decode keystore
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          echo "Keystore decoded to app/release.keystore"

      - name: Configure signing properties
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::ANDROID_KEY_ALIAS secret is not set"
            exit 1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error::ANDROID_KEY_PASSWORD secret is not set"
            exit 1
          fi
          cat > keystore.properties << EOF
          storeFile=app/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "keystore.properties created"

      - name: Build signed release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        run: |
          if [ ! -f "keystore.properties" ]; then
            echo "::error::keystore.properties not found"
            exit 1
          fi
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=1.1 \
            --console=plain

      - name: Upload release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: lich-am-release-v1.1-b${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1-b${{ github.run_number }}
          name: v1.1-b${{ github.run_number }}
          body: |
            Release build từ workflow_dispatch.
            - Phiên bản: 1.1 (build ${{ github.run_number }})
            - Yêu cầu: Android 6.0+
            - APK đã ký (signed)
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
