name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-read-only: false

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: ./gradlew clean assembleDebug

      - name: Decode keystore (manual release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "Keystore decoded"
          else
            echo "No keystore secret set - building unsigned APK"
          fi

      - name: Configure signing for release (manual release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' && secrets.ANDROID_KEYSTORE_PASSWORD != '' }}
        run: |
          cat > keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK (manual release)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        run: |
          if [ -f "keystore.properties" ]; then
            mv keystore.properties app/keystore.properties
          fi
          ./gradlew clean assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lich-am-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType || 'debug' }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
