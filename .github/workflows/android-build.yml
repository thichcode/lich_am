name: Android CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'landing/**'
      - '*.md'
      - '.github/workflows/generate-keystore.yml'
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ---- DEBUG BUILD (push to main) ----
      - name: Build debug APK
        if: ${{ github.event_name == 'push' }}
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }} -PversionName=1.2 --console=plain

      # ---- RELEASE BUILD (workflow_dispatch) ----
      - name: Decode keystore
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            echo "Keystore decoded from secret"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret, generating temporary keystore..."
            keytool -genkey -v -keystore app/release.keystore \
              -storepass android -keypass android \
              -alias licham -validity 10000 \
              -dname "CN=CI,L=HCMC,ST=VN,C=VN" \
              -keyalg RSA -keysize 2048 2>/dev/null
            echo "Temporary keystore generated at app/release.keystore"
          fi

      - name: Configure signing properties
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storeFile=app/release.keystore
          storePassword=${KEYSTORE_PASSWORD:-android}
          keyAlias=${KEY_ALIAS:-licham}
          keyPassword=${KEY_PASSWORD:-android}
          EOF
          echo "keystore.properties created"

      - name: Build signed release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=1.2 \
            --console=plain

      # ---- CREATE GITHUB RELEASE (push or workflow_dispatch) ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2-b${{ github.run_number }}
          name: v1.2-b${{ github.run_number }}
          body: |
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' && 'Phiên bản chính thức (APK đã ký)' || 'Bản debug tự động' }}
            - Phiên bản: 1.2 (build ${{ github.run_number }})
            - Yêu cầu: Android 6.0+
            - Kích hoạt bởi: ${{ github.event_name }}${{ github.event_name == 'workflow_dispatch' && format(' ({0})', github.event.inputs.buildType) || '' }}
          files: |
            app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.buildType != 'release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
