name: Android CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'landing/**'
      - '*.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'landing/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: ./gradlew assembleDebug --console=plain

      - name: Upload debug APK
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: lich-am-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Decode keystore (release only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "Keystore decoded"
          else
            echo "No keystore secret set - building unsigned APK"
          fi

      - name: Configure signing for release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "No keystore password set - skipping signing config"
            exit 0
          fi
          cat > keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        run: |
          if [ -f "keystore.properties" ]; then
            mv keystore.properties app/keystore.properties
          fi
          ./gradlew assembleRelease --console=plain

      - name: Upload release APK
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: lich-am-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Generate version tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        id: version
        run: |
          VER="v1.0.0-build$(date +%Y%m%d)-${{ github.run_number }}"
          echo "tag=$VER" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            Build tự động từ GitHub Actions workflow_dispatch.
            Phiên bản: ${{ steps.version.outputs.tag }}
            Yêu cầu: Android 6.0+
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
