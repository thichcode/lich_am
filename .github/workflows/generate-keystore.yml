# ⚠️ WARNING: Run this workflow ONLY ONCE to generate the signing keystore.
# If the keystore is lost or a different keystore is used, existing users
# cannot update the app (signature mismatch). Keep the keystore file safe.
name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release.keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -storepass android \
            -keypass android \
            -alias lunarcalendar \
            -validity 10000 \
            -dname "CN=Lunar Calendar, OU=Personal, O=Personal, L=Hanoi, ST=HN, C=VN" \
            -keyalg RSA -keysize 2048
          echo "Keystore generated successfully"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore
          if-no-files-found: error
